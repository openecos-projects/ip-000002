name: validate

on:
  push:
  pull_request:

jobs:
  metadata:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: python -m pip install pyyaml
      - run: python scripts/validate-metadata.py
